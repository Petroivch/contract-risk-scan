name: Mobile CI

on:
  pull_request:
    paths:
      - "apps/mobile/**"
      - ".github/workflows/mobile-ci.yml"
  push:
    branches:
      - master
      - main
    paths:
      - "apps/mobile/**"
      - ".github/workflows/mobile-ci.yml"

jobs:
  mobile-checks:
    name: Typecheck, lint, smoke
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/mobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Smoke test
        run: npm run smoke
